<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><title>3Dmol Test</title>
<style>body{margin:0;background:#1e293b;} #v{width:400px;height:400px;}</style>
</head>
<body>
<div id="v"></div>
<script src="lib/3dmol-min.js"></script>
<script>
var GL = window.$3Dmol || window['3Dmol'];
console.log('3Dmol exists:', typeof GL);
console.log('createViewer exists:', typeof (GL || {}).createViewer);
try {
  var el = document.getElementById('v');
  var viewer = GL.createViewer(el, { backgroundColor: '0x1e293b' });
  viewer.addSphere({ center: {x:0,y:0,z:0}, radius: 1.5, color: 'red' });
  viewer.addSphere({ center: {x:3,y:0,z:0}, radius: 0.8, color: 'blue' });
  viewer.zoomTo();
  viewer.render();
  console.log('Rendered OK');
  document.body.innerHTML += '<p style="color:#0f0">Rendered!</p>';
} catch(e) {
  document.body.innerHTML += '<p style="color:red">Error: ' + e.message + '</p>';
  console.error(e);
}
</script>
</body>
</html>
