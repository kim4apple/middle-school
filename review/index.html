  .card .icon-wrap{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:10px;background:rgba(79,70,229,0.08);color:var(--accent);}
  .card .icon-wrap svg{width:22px;height:22px;}
  [data-theme="dark"] .card .icon-wrap{background:rgba(129,140,248,0.12);}
  .card .name{font-size:16px;font-weight:700;margin-bottom:4px;}
  .card .desc{font-size:13px;color:var(--text-secondary);}
  .section-title{font-size:20px;font-weight:700;margin:32px 0 16px;display:flex;align-items:center;gap:8px;}
  .back{display:inline-block;margin-bottom:24px;color:var(--accent);text-decoration:none;font-size:14px;}
  .back:hover{text-decoration:underline;}
  .card-empty{grid-column:1/-1;text-align:center;padding:40px;color:var(--text-secondary);font-size:14px;border:1px dashed var(--border);border-radius:var(--card-radius);}
</style>
</head>
