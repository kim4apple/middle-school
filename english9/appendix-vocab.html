/* ── Home Dashboard ── */
function renderHome() {
  var total = 0;
  VOCAB_DATA.forEach(function(u) { total += u.words.length; });
  var mastered = Object.keys(state.mastered).length;
  var streak = getStudyStreak();
  var today = getTodayStudy();
  var pct = total > 0 ? Math.round(mastered / total * 100) : 0;
  var hour = new Date().getHours();
  var greet = hour < 6 ? '凌晨好' : hour < 9 ? '早上好' : hour < 12 ? '上午好' : hour < 14 ? '中午好' : hour < 18 ? '下午好' : '晚上好';

  var html = '<div class="home-content">';
  html += '<div class="home-greet"><span class="greet-emoji">👋</span><div><div class="greet-text">' + greet + '！</div><div class="greet-sub">今天已学 <strong>' + today + '</strong> 词</div></div></div>';
  
  if (streak > 1) html += '<div class="home-streak">🔥 连续学习 <strong>' + streak + '</strong> 天</div>';
  
  /* --- Due review reminder --- */
  var dueCount = 0;
  Object.keys(state.srs).forEach(function(k) { if (isSrsDue(k)) dueCount++; });
  if (dueCount > 0) {
    html += '<div class="home-streak" style="background:var(--accent-light);color:var(--accent);border:1px solid var(--accent);margin-top:12px;">📅 有 <strong>' + dueCount + '</strong> 个词待复习</div>';
  }
  
  html += '<div class="home-progress"><div class="hp-header"><span>总进度</span><span><strong>' + mastered + '</strong>/' + total + '</span></div>';
  html += '<div class="hp-bar"><div class="hp-fill" style="width:' + pct + '%"></div></div></div>';
  
  // Quick stats
  var wrongCount = Object.keys(state.srs).filter(function(k) { return state.srs[k].w > 2; }).length;
  html += '<div class="home-stats"><div class="hs-card"><div class="hs-num">' + total + '</div><div class="hs-label">总词汇</div></div>';
  html += '<div class="hs-card"><div class="hs-num">' + mastered + '</div><div class="hs-label">已掌握</div></div>';
  html += '<div class="hs-card"><div class="hs-num" style="color:' + (wrongCount>0?'#dc2626':'var(--accent)') + '">' + wrongCount + '</div><div class="hs-label">易错词</div></div>';
  html += '<div class="hs-card"><div class="hs-num">' + pct + '%</div><div class="hs-label">掌握率</div></div></div>';
  
  /* --- Efficiency score --- */
  var effScore = calcEfficiencyScore();
  if (effScore !== '—') {
    var scoreColor = effScore >= 80 ? '#16a34a' : effScore >= 50 ? '#ca8a04' : '#dc2626';
    html += '<div class="home-progress" style="margin-top:12px;border-color:' + scoreColor + ';">';
    html += '<div class="hp-header"><span>📊 今日效率评分</span><span style="font-size:18px;font-weight:800;color:' + scoreColor + ';">' + effScore + '</span></div>';
    if (effScore >= 80) html += '<div style="font-size:12px;color:var(--text-secondary);margin-top:4px;">🌟 状态极佳，继续保持！</div>';
    else if (effScore >= 50) html += '<div style="font-size:12px;color:var(--text-secondary);margin-top:4px;">💪 还可以，再加把劲</div>';
    else html += '<div style="font-size:12px;color:var(--text-secondary);margin-top:4px;">📖 坚持就是胜利</div>';
    html += '</div>';
  }
  
  // Quick actions
  html += '<div class="home-actions" style="margin-top:12px;"><div class="ha-label">快速开始</div>';
  if (dueCount > 0) {
    html += '<button class="ha-btn" onclick="switchView(\'learn\');switchLearnMode(\'flashcard\')">📅 复习待学词 (' + dueCount + ')</button>';
  }
  html += '<button class="ha-btn" onclick="switchView(\'table\')">📋 浏览单词表</button>';
  html += '<button class="ha-btn" onclick="switchView(\'learn\')">🎯 开始学习</button>';
  if (wrongCount > 0) {
    html += '<button class="ha-btn" style="background:#dc2626;" onclick="startWrongReview()">❌ 复习错词 (' + wrongCount + ')</button>';
  }
  html += '</div></div>';
  
  document.getElementById('homeView').innerHTML = html;
}
var themeKey = "eng9-vocab";

function getStudyStreak() {
  var st = getStats();
  return st.s || 0;
}

function getTodayStudy() {
  var st = getStats();
  var today = new Date().toISOString().split('T')[0];
  var td = st.d[today] || { c: 0, w: 0 };
  return td.c + td.w;
}



var TABS = ['home', 'table', 'learn', 'stats'];
var TAB_TITLES = {home:'🏠 主页', table:'📋 单词表', learn:'🎯 学习', stats:'📊 统计'};
var LEARN_MODES = ['flashcard', 'dictation', 'quiz'];

function switchView(view) {
  state.view = view;
  document.getElementById('appTitle').textContent = TAB_TITLES[view] || '📋 单词表';
  document.querySelectorAll('.tab-item').forEach(function(b) {
    b.classList.toggle('active', b.dataset.tab === view);
  });
  document.querySelectorAll('.view-panel').forEach(function(p) { p.classList.remove('active'); });
  var panelMap = {home:'homeView', table:'tableView', learn:'learnView', stats:'statsView'};
  var el = document.getElementById(panelMap[view]);
  if (el) el.classList.add('active');
  if (view !== 'learn') {
    document.getElementById('learnHome').style.display = '';
    LEARN_MODES.forEach(function(m) {
      var v = document.getElementById(m + 'View');
      if (v) v.style.display = '';
    });
  }
  if (view === 'home') renderHome();
  else if (view === 'table') renderTable();
  else if (view === 'learn') showLearnHome();
  else if (view === 'stats') renderStats();
}

function switchLearnMode(mode) {
  document.getElementById('learnHome').style.display = 'none';
  document.getElementById('appTitle').textContent = TAB_TITLES['learn'] + ' · ' + 
    ({flashcard:'自测卡', dictation:'听写', quiz:'选择题'})[mode];
  LEARN_MODES.forEach(function(m) {
    var v = document.getElementById(m + 'View');
    if (v) v.style.display = m === mode ? 'block' : 'none';
  });
  if (mode === 'flashcard') resetFlashcard();
  else if (mode === 'dictation') startDictation();
  else if (mode === 'quiz') startQuiz();
}

function showLearnHome() {
  document.getElementById('appTitle').textContent = TAB_TITLES['learn'];
  document.getElementById('learnHome').style.display = '';
  LEARN_MODES.forEach(function(m) {
    var v = document.getElementById(m + 'View');
    if (v) v.style.display = 'none';
  });
}

/* ================================================================
   INIT
   ================================================================ */
document.querySelectorAll('.tab-item').forEach(function(b) {
  b.addEventListener('click', function() { switchView(this.dataset.tab); });
});

document.querySelectorAll('.filter-bar button').forEach(function(b) {
  b.addEventListener('click', function() {
    document.querySelectorAll('.filter-bar button').forEach(function(x) { x.classList.remove('active'); });
    this.classList.add('active');
    state.filter = this.dataset.filter;
    if (state.view === 'table') renderTable();
    else if (state.view === 'flashcard') resetFlashcard();
    else if (state.view === 'dictation') startDictation();
    else if (state.view === 'quiz') startQuiz();
  });
});

document.querySelectorAll('.level-filter-bar button').forEach(function(b) {
  b.addEventListener('click', function() {
    document.querySelectorAll('.level-filter-bar button').forEach(function(x) { x.classList.remove('active'); });
    this.classList.add('active');
    state.levelFilter = this.dataset.level === 'all' ? null : this.dataset.level;
    if (state.view === 'table') renderTable();
    else if (state.view === 'flashcard') resetFlashcard();
    else if (state.view === 'dictation') startDictation();
    else if (state.view === 'quiz') startQuiz();
  });
});

var sel = document.getElementById('unitFilter');
VOCAB_DATA.forEach(function(u) {
  var opt = document.createElement('option');
  opt.value = u.label;
  opt.textContent = shortUnitLabel(u.label, u.title);
  sel.appendChild(opt);
});
sel.addEventListener('change', function() {
  state.unitFilter = this.value;
  if (state.view === 'table') renderTable();
  else if (state.view === 'flashcard') resetFlashcard();
  else if (state.view === 'dictation') startDictation();
  else if (state.view === 'quiz') startQuiz();
});

document.addEventListener('keydown', function(e) {
  if (state.view === 'flashcard' && (e.key === ' ' || e.key === 'Enter')) {
    e.preventDefault();
    if (!state.isFlipped) flipCard();
    else handleCard(3);
  }
  if (state.view === 'dictation' && e.key === 'Enter') {
    if (!state.dictRevealed) { e.preventDefault(); checkDictation(); }
    else { e.preventDefault(); nextDictation(); }
  }
  if (state.view === 'quiz' && e.key === 'Enter' && state.quizAnswered) {
    e.preventDefault(); nextQuiz();
  }
});

/* ── Swipe gesture for tab switching ── */
(function() {
  var startX = 0, startY = 0;
  document.addEventListener('touchstart', function(e) {
    startX = e.changedTouches[0].screenX;
    startY = e.changedTouches[0].screenY;
  }, {passive: true});
  document.addEventListener('touchend', function(e) {
    var diffX = startX - e.changedTouches[0].screenX;
    var diffY = startY - e.changedTouches[0].screenY;
    if (Math.abs(diffX) < 50 || Math.abs(diffX) < Math.abs(diffY)) return;
    var idx = TABS.indexOf(state.view);
    if (idx < 0) return;
    if (diffX > 0 && idx < TABS.length - 1) switchView(TABS[idx + 1]);
    else if (diffX < 0 && idx > 0) switchView(TABS[idx - 1]);
  }, {passive: true});
})();

/* ================================================================

   ================================================================ */
function setTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('eng9-theme', theme);
  var btn = document.getElementById('themeToggle');
  if (btn) btn.textContent = theme === 'dark' ? '☀️' : '🌙';
}
function toggleTheme() {
  var current = document.documentElement.getAttribute('data-theme');
  setTheme(current === 'dark' ? 'light' : 'dark');
}
function initTheme() {
  var saved = localStorage.getItem('eng9-theme');
  if (saved) { setTheme(saved); return; }
  if (window.matchMedia('(prefers-color-scheme: dark)').matches) setTheme('dark');
}
initTheme();
switchView('home');
