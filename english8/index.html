<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>初中英语八年级 · 自学参考</title>
<link rel="stylesheet" href="css/english8.css">
<style>
body.index-page { display: block; min-height: 100vh; }
.index-wrapper { max-width: 820px; margin: 0 auto; padding: 32px 24px 60px; }
.hero { text-align: center; padding: 40px 0 32px; position: relative; }
.hero::after { content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 60px; height: 3px; background: var(--accent); border-radius: 2px; }
.hero h1 { font-size: 32px; font-weight: 800; margin-bottom: 6px; letter-spacing: -0.5px; }
.hero .tagline { color: var(--text-secondary); font-size: 14px; margin-top: 6px; }
.hero .badge-row { margin-top: 14px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
.hero .badge-row span { font-size: 11px; padding: 4px 14px; border-radius: 20px; background: var(--accent-light); color: var(--accent); font-weight: 600; }
.nav-links { display: flex; justify-content: center; gap: 20px; margin-bottom: 36px; font-size: 13px; flex-wrap: wrap; }
.nav-links a { color: var(--accent); text-decoration: none; font-weight: 600; padding: 4px 0; border-bottom: 2px solid transparent; }
.nav-links a:hover { border-bottom-color: var(--accent); }
.nav-links .sep { color: var(--border); user-select: none; }
.semester { margin-bottom: 40px; }
.semester-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 14px; flex-wrap: wrap; }
.semester-title { font-size: 16px; font-weight: 700; }
.semester-title .sub { font-weight: 400; font-size: 12px; color: var(--text-secondary); margin-left: 8px; }
.semester-progress { font-size: 12px; color: var(--text-secondary); }
.semester-progress strong { color: var(--accent); }
.unit-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 14px; }
.unit-card { display: block; position: relative; padding: 18px 18px 14px; border-radius: 12px; border: 1px solid var(--border); text-decoration: none; color: var(--text); background: var(--bg); transition: transform 0.2s ease, box-shadow 0.2s ease; text-align: left; overflow: hidden; }
.unit-card::before { content: ''; position: absolute; left: 0; top: 8px; bottom: 8px; width: 3px; border-radius: 2px; }
#s1 .unit-card::before { background: #8b5cf6; }
#s2 .unit-card::before { background: #f59e0b; }
[data-theme="dark"] #s1 .unit-card::before { background: #a78bfa; }
[data-theme="dark"] #s2 .unit-card::before { background: #fbbf24; }
.unit-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px -6px rgba(139,92,246,0.12); }
[data-theme="dark"] .unit-card:hover { box-shadow: 0 6px 20px -6px rgba(167,139,250,0.2); }
.unit-card .bg-label { position: absolute; right: 8px; bottom: 4px; font-size: 48px; font-weight: 800; line-height: 1; letter-spacing: -2px; pointer-events: none; user-select: none; color: #e2e8f0; }
[data-theme="dark"] .unit-card .bg-label { color: #1e293b; }
.unit-card .title { font-size: 14px; font-weight: 600; line-height: 1.35; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.unit-card .topic { font-size: 12px; color: var(--text-secondary); margin-top: 3px; }
.footer-info { text-align: center; margin-top: 48px; padding-top: 24px; border-top: 1px solid var(--border); font-size: 12px; color: var(--text-secondary); line-height: 2; }
.footer-info a { color: var(--accent); text-decoration: none; }
.footer-info a:hover { text-decoration: underline; }
.back-to-top { position: fixed; bottom: 24px; right: 24px; width: 44px; height: 44px; border-radius: 50%; background: var(--accent); color: #fff; border: none; cursor: pointer; font-size: 18px; box-shadow: 0 2px 8px rgba(0,0,0,0.2); display: none; z-index: 999; align-items: center; justify-content: center; }
@media (max-width: 640px) { .index-wrapper { padding: 20px 14px 40px; } .hero h1 { font-size: 24px; } .hero { padding: 24px 0; } .hero .badge-row span { font-size: 10px; padding: 3px 10px; } .semester-title { font-size: 14px; } .unit-grid { grid-template-columns: 1fr 1fr; gap: 10px; } .unit-card { padding: 14px 12px; } .unit-card .title { font-size: 13px; line-height: 1.3; } .unit-card .bg-label { font-size: 36px; } .nav-links { gap: 12px; font-size: 12px; } }
</style>
<script>(function(){var t=localStorage.getItem("eng8-theme");if(!t)t=window.matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light";document.documentElement.setAttribute("data-theme",t);})();</script>
</head>
<body class="index-page">

<button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="切换主题">🌙</button>
<button class="back-to-top" id="backToTop">↑</button>

<div class="index-wrapper">

  <div class="hero">
    <h1>📖 初中英语八年级</h1>
    <p class="tagline">2024 人教版同步 · 逐课精讲 · 阅读+写作+Project</p>
    <div class="badge-row">
      <span>📝 重点词汇</span>
      <span>📚 语法聚焦</span>
      <span>📖 阅读专项</span>
      <span>🏆 中考题型</span>
      <span>🎯 Project</span>
    </div>
  </div>

  <div class="nav-links">
    <a href="../index.html">🏠 返回首页</a>
    <span class="sep">·</span>
    <a href="#s1">📗 八上</a>
    <span class="sep">·</span>
    <a href="#s2">📘 八下</a>
    <span class="sep">·</span>
    <a href="../grammar.html">📌 语法全景图</a>
    <span class="sep">·</span>
    <a href="appendix-vocab.html">📖 单词专项</a>
  </div>

  <div class="semester" id="s1">
    <div class="semester-header">
      <div class="semester-title">📗 八年级上册 <span class="sub">Unit 1–8</span></div>
      <div class="semester-progress">已完成 <strong>8</strong> / 8 单元</div>
    </div>
    <div class="unit-grid" id="s1-grid"></div>
  </div>

  <div class="semester" id="s2">
    <div class="semester-header">
      <div class="semester-title">📘 八年级下册 <span class="sub">Unit 1–8</span></div>
      <div class="semester-progress">已完成 <strong>8</strong> / 8 单元</div>
    </div>
    <div class="unit-grid" id="s2-grid"></div>
  </div>

  <div class="footer-info">
    <a href="../index.html">🏠 返回首页</a> &nbsp;·&nbsp;
    <a href="appendix-grammar.html">📌 语法全景图</a> &nbsp;·&nbsp;
    <a href="appendix-vocab.html">📖 单词专项</a> &nbsp;·&nbsp;
    <a href="#">⬆ 回到顶部</a><br>
    所有页面纯离线 HTML · 支持暗色模式 · 答案渐进显示
  </div>
</div>

<script>
(function() {
  var units = {
    s1: [
      {id:"u01", label:"U1", title:"Happy Holiday!", topic:"假期活动", en:"假期计划与体验"},
      {id:"u02", label:"U2", title:"How often do you exercise?", topic:"生活习惯", en:"频率与健康"},
      {id:"u03", label:"U3", title:"I'm more outgoing than my sister.", topic:"个人特质", en:"比较级与性格"},
      {id:"u04", label:"U4", title:"What's the best movie theater?", topic:"偏好比较", en:"最高级与评价"},
      {id:"u05", label:"U5", title:"Do you want to watch a game show?", topic:"媒体偏好", en:"电视节目与喜好"},
      {id:"u06", label:"U6", title:"I'm going to study computer science.", topic:"职业规划", en:"未来计划与志向"},
      {id:"u07", label:"U7", title:"Will people have robots?", topic:"未来预测", en:"未来生活与科技"},
      {id:"u08", label:"U8", title:"Let's Communicate!", topic:"沟通表达", en:"交流与观点表达"}
    ],
    s2: [
      {id:"b2u01", label:"U1", title:"Time to Relax!", topic:"放松与娱乐", en:"休闲活动"},
      {id:"b2u02", label:"U2", title:"Let's clean up!", topic:"环保行动", en:"环境保护"},
      {id:"b2u03", label:"U3", title:"Could you please clean your room?", topic:"家务劳动", en:"请求与允许"},
      {id:"b2u04", label:"U4", title:"Why don't you talk to your parents?", topic:"人际沟通", en:"建议与烦恼"},
      {id:"b2u05", label:"U5", title:"What were you doing when the rainstorm came?", topic:"过去进行", en:"过去进行时"},
      {id:"b2u06", label:"U6", title:"An old man tried to move the mountains.", topic:"故事传说", en:"叙事与文学"},
      {id:"b2u07", label:"U7", title:"What's the highest mountain in the world?", topic:"世界之最", en:"比较与地理"},
      {id:"b2u08", label:"U8", title:"Making a Difference", topic:"社会责任", en:"公益与影响力"}
    ]
  };
  [].forEach.call(['s1','s2'], function(s) {
    var g = document.getElementById(s+'-grid');
    units[s].forEach(function(u) {
      var c = document.createElement('a');
      c.className = 'unit-card done';
      c.href = u.id + '.html';
      c.innerHTML = '<span class="bg-label">' + u.label + '</span><div class="title">' + u.title + '</div><div class="topic">' + u.topic + '</div>';
      g.appendChild(c);
    });
  });
  var btn = document.getElementById('backToTop');
  window.addEventListener('scroll', function() { btn.style.display = window.scrollY > 300 ? 'flex' : 'none'; }, { passive: true });
  btn.addEventListener('click', function() { window.scrollTo({ top: 0, behavior: 'smooth' }); });
})();
function setTheme(t) { document.documentElement.setAttribute("data-theme", t); localStorage.setItem("eng8-theme", t); var btn = document.getElementById("themeToggle"); if (btn) btn.textContent = t === "dark" ? "☀️" : "🌙"; }
function toggleTheme() { setTheme(document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark"); }
</script>
</body>
</html>
