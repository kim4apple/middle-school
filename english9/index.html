<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>初中英语九年级 · 自学参考</title>
<link rel="stylesheet" href="css/english9.css">
<style>
body.index-page { display: block; min-height: 100vh; }
.index-wrapper { max-width: 820px; margin: 0 auto; padding: 32px 24px 60px; }
.hero { text-align: center; padding: 40px 0 32px; position: relative; }
.hero::after { content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 60px; height: 3px; background: var(--accent); border-radius: 2px; }
.hero h1 { font-size: 32px; font-weight: 800; margin-bottom: 6px; letter-spacing: -0.5px; }
.hero .tagline { color: var(--text-secondary); font-size: 14px; margin-top: 6px; }
.hero .badge-row { margin-top: 14px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
.hero .badge-row span { font-size: 11px; padding: 4px 14px; border-radius: 20px; background: var(--accent-light); color: var(--accent); font-weight: 600; }
.nav-links { display: flex; justify-content: center; gap: 20px; margin-bottom: 36px; font-size: 13px; flex-wrap: wrap; }
.nav-links a { color: var(--accent); text-decoration: none; font-weight: 600; padding: 4px 0; border-bottom: 2px solid transparent; }
.nav-links a:hover { border-bottom-color: var(--accent); }
.nav-links .sep { color: var(--border); user-select: none; }
.semester { margin-bottom: 40px; }
.semester-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 14px; flex-wrap: wrap; }
.semester-title { font-size: 16px; font-weight: 700; }
.semester-title .sub { font-weight: 400; font-size: 12px; color: var(--text-secondary); margin-left: 8px; }
.semester-progress { font-size: 12px; color: var(--text-secondary); }
.semester-progress strong { color: var(--accent); }
.unit-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 14px; }
.unit-card { display: block; position: relative; padding: 18px 18px 14px; border-radius: 12px; border: 1px solid var(--border); text-decoration: none; color: var(--text); background: var(--bg); transition: transform 0.2s ease, box-shadow 0.2s ease; text-align: left; overflow: hidden; }
.unit-card::before { content: ''; position: absolute; left: 0; top: 8px; bottom: 8px; width: 3px; border-radius: 2px; background: #ef4444; }
[data-theme="dark"] .unit-card::before { background: #f87171; }
.unit-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px -6px rgba(239,68,68,0.12); }
[data-theme="dark"] .unit-card:hover { box-shadow: 0 6px 20px -6px rgba(248,113,113,0.2); }
.unit-card .bg-label { position: absolute; right: 8px; bottom: 4px; font-size: 48px; font-weight: 800; line-height: 1; letter-spacing: -2px; pointer-events: none; user-select: none; color: #e2e8f0; }
[data-theme="dark"] .unit-card .bg-label { color: #1e293b; }
.unit-card .title { font-size: 14px; font-weight: 600; line-height: 1.35; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.unit-card .topic { font-size: 12px; color: var(--text-secondary); margin-top: 3px; }
.footer-info { text-align: center; margin-top: 48px; padding-top: 24px; border-top: 1px solid var(--border); font-size: 12px; color: var(--text-secondary); line-height: 2; }
.footer-info a { color: var(--accent); text-decoration: none; }
.footer-info a:hover { text-decoration: underline; }
.back-to-top { position: fixed; bottom: 24px; right: 24px; width: 44px; height: 44px; border-radius: 50%; background: var(--accent); color: #fff; border: none; cursor: pointer; font-size: 18px; box-shadow: 0 2px 8px rgba(0,0,0,0.2); display: none; z-index: 999; align-items: center; justify-content: center; }
@media (max-width: 640px) { .index-wrapper { padding: 20px 14px 40px; } .hero h1 { font-size: 24px; } .hero { padding: 24px 0; } .hero .badge-row span { font-size: 10px; padding: 3px 10px; } .semester-title { font-size: 14px; } .unit-grid { grid-template-columns: 1fr 1fr; gap: 10px; } .unit-card { padding: 14px 12px; } .unit-card .title { font-size: 13px; line-height: 1.3; padding-right: 32px; } .unit-card .topic { padding-right: 32px; } .unit-card .bg-label { font-size: 36px; } .unit-card .toggle-btn { width: 36px; height: 36px; top: 6px; right: 6px; } .nav-links { gap: 12px; font-size: 12px; } }
</style>
<script>(function(){var t=localStorage.getItem("eng9-theme");if(!t)t=window.matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light";document.documentElement.setAttribute("data-theme",t);})();</script>
</head>
<body class="index-page">

<button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="切换主题">🌙</button>
<button class="back-to-top" id="backToTop">↑</button>

<div class="index-wrapper">

  <div class="hero">
    <h1>📖 初中英语九年级</h1>
    <p class="tagline">2024 人教版全一册 · 中考冲刺 · 全面突破</p>
    <div class="badge-row">
      <span>📝 重点词汇</span>
      <span>📚 语法聚焦</span>
      <span>📖 阅读专项</span>
      <span>🏆 中考题型</span>
      <span>🎯 Project</span>
    </div>
  </div>

  <div class="progress-panel" id="progressPanel" style="display:none">
    <div class="pp-header">
      <h2>📊 学习进度</h2>
      <span class="pp-date" id="ppDate"></span>
    </div>
    <div class="pp-bar-label"><span>总进度</span><span id="ppTotalLabel">0 / 0</span></div>
    <div class="pp-bar-bg"><div class="pp-bar-fill" id="ppTotalBar" style="width:0%"></div></div>
    <div id="ppSemesters"></div>
  </div>

  <div class="nav-links">
    <a href="../index.html">🏠 返回首页</a>
    <span class="sep">·</span>
    <a href="#s1">📕 九年级</a>
    <span class="sep">·</span>
    <a href="../grammar.html">📌 语法全景图</a>
    <span class="sep">·</span>
    <a href="appendix-vocab.html">📖 单词专项</a>
  </div>

  <div class="semester" id="s1">
    <div class="semester-header">
      <div class="semester-title">📕 九年级全一册 <span class="sub">Unit 1–14</span></div>
    </div>
    <div class="unit-grid" id="s1-grid"></div>
  </div>

  <div class="footer-info">
    <a href="../index.html">🏠 返回首页</a> &nbsp;·&nbsp;
    <a href="appendix-grammar.html">📌 语法全景图</a> &nbsp;·&nbsp;
    <a href="appendix-vocab.html">📖 单词专项</a> &nbsp;·&nbsp;
    <a href="#">⬆ 回到顶部</a><br>
    所有页面纯离线 HTML · 支持暗色模式 · 答案渐进显示
  </div>
</div>

<script>
(function(){
  var CONFIG = {
    key: 'eng9-progress',
    semesters: [
      { id:'s1', label:'📕 九年级全一册', sub:'Unit 1–14' }
    ],
    units: {
      s1: [
        {id:'u01', label:'U1', title:'How can we become good learners?', topic:'学习方法'},
        {id:'u02', label:'U2', title:'I think that mooncakes are delicious!', topic:'节日与文化'},
        {id:'u03', label:'U3', title:'Could you please tell me where the restrooms are?', topic:'问路与请求'},
        {id:'u04', label:'U4', title:'I used to be afraid of the dark.', topic:'变化与成长'},
        {id:'u05', label:'U5', title:'What are the shirts made of?', topic:'产品与材料'},
        {id:'u06', label:'U6', title:'When was it invented?', topic:'发明历史'},
        {id:'u07', label:'U7', title:'Teenagers should be allowed to choose their own clothes.', topic:'规则与许可'},
        {id:'u08', label:'U8', title:'It must belong to Carla.', topic:'推测与判断'},
        {id:'u09', label:'U9', title:'I like music that I can dance to.', topic:'偏好与定从'},
        {id:'u10', label:'U10', title:"You're supposed to shake hands.", topic:'礼仪与文化'},
        {id:'u11', label:'U11', title:'Sad movies make me cry.', topic:'情感与感受'},
        {id:'u12', label:'U12', title:'Life is full of the unexpected.', topic:'意外与经历'},
        {id:'u13', label:'U13', title:"We're trying to save the earth!", topic:'环保与行动'},
        {id:'u14', label:'U14', title:'I remember meeting all of you in Grade 7.', topic:'回忆与毕业'}
      ]
    }
  };

  function load() { var raw = localStorage.getItem(CONFIG.key); return raw ? JSON.parse(raw) : { completed: {}, lastStudyDate: null }; }
  function save(data) { localStorage.setItem(CONFIG.key, JSON.stringify(data)); }

  function renderUnits(data) {
    CONFIG.semesters.forEach(function(sem) {
      var grid = document.getElementById(sem.id + '-grid');
      if (!grid) return;
      grid.innerHTML = '';
      CONFIG.units[sem.id].forEach(function(u) {
        var isDone = !!data.completed[u.id];
        var card = document.createElement('a');
        card.className = 'unit-card' + (isDone ? ' completed' : '');
        card.href = u.id + '.html';
        card.innerHTML =
          '<button class="toggle-btn" data-unit="' + u.id + '" title="标记完成">' +
          (isDone ? '✅' : '○') + '</button>' +
          '<span class="bg-label">' + u.label + '</span>' +
          '<div class="title">' + u.title + '</div>' +
          '<div class="topic">' + u.topic + '</div>';
        card.querySelector('.toggle-btn').addEventListener('click', function(e) {
          e.preventDefault();
          e.stopPropagation();
          toggleComplete(u.id);
        });
        grid.appendChild(card);
      });
    });
  }

  function toggleComplete(id) {
    var data = load();
    if (data.completed[id]) { delete data.completed[id]; }
    else { data.completed[id] = new Date().toISOString().slice(0,10); data.lastStudyDate = data.completed[id]; }
    save(data);
    renderUnits(data);
    renderStats(data);
  }

  function semesterCount(data, semId) {
    var list = CONFIG.units[semId] || [];
    var done = 0;
    list.forEach(function(u) { if (data.completed[u.id]) done++; });
    return { done: done, total: list.length };
  }

  function renderStats(data) {
    var panel = document.getElementById('progressPanel');
    if (!panel) return;
    panel.style.display = '';
    var total = 0, done = 0;
    CONFIG.semesters.forEach(function(sem) { var c = semesterCount(data, sem.id); total += c.total; done += c.done; });
    var pct = total === 0 ? 0 : Math.round(done / total * 100);
    document.getElementById('ppTotalLabel').textContent = done + ' / ' + total + ' (' + pct + '%)';
    document.getElementById('ppTotalBar').style.width = pct + '%';
    document.getElementById('ppDate').textContent = data.lastStudyDate ? '最近学习 ' + data.lastStudyDate : '';
    var html = '';
    CONFIG.semesters.forEach(function(sem) {
      var c = semesterCount(data, sem.id);
      var sp = c.total === 0 ? 0 : Math.round(c.done / c.total * 100);
      html += '<div class="pp-semester"><div class="pp-bar-label"><span>' + sem.label + '</span><span>' + c.done + ' / ' + c.total + '</span></div><div class="pp-bar-bg"><div class="pp-bar-fill" style="width:' + sp + '%"></div></div></div>';
    });
    document.getElementById('ppSemesters').innerHTML = html;
  }

  var data = load();
  renderUnits(data);
  renderStats(data);

  var btn = document.getElementById('backToTop');
  window.addEventListener('scroll', function() { btn.style.display = window.scrollY > 300 ? 'flex' : 'none'; }, { passive: true });
  btn.addEventListener('click', function() { window.scrollTo({ top: 0, behavior: 'smooth' }); });
})();
function setTheme(t) { document.documentElement.setAttribute("data-theme", t); localStorage.setItem("eng9-theme", t); var btn = document.getElementById("themeToggle"); if (btn) btn.textContent = t === "dark" ? "☀️" : "🌙"; }
function toggleTheme() { setTheme(document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark"); }
</script>
</body>
</html>
