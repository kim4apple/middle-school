<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中学数理自学参考</title>
<style>
:root {
  --bg: #ffffff; --bg-secondary: #f1f5f9; --text: #1a1a2e;
  --text-secondary: #64748b; --accent: #4f46e5; --accent-light: #eef2ff;
  --border: #e2e8f0; --radius: 14px;
  --math: #4f46e5; --physics: #0891b2; --chemistry: #059669;
  --review: #d97706;
}
[data-theme="dark"] {
  --bg: #0f172a; --bg-secondary: #1e293b; --text: #e2e8f0;
  --text-secondary: #94a3b8; --accent: #818cf8; --accent-light: #1e1b4b;
  --border: #334155;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg); color: var(--text); line-height: 1.7;
  min-height: 100vh; display: flex; justify-content: center; padding: 40px 20px;
}
.container { max-width: 800px; width: 100%; }

h1 { font-size: 28px; font-weight: 800; text-align: center; margin-bottom: 6px; letter-spacing: -0.5px; }
.subtitle { text-align: center; color: var(--text-secondary); font-size: 14px; margin-bottom: 40px; }

.section { margin-bottom: 36px; }
.section:last-of-type { margin-bottom: 0; }

.section-title {
  font-size: 14px; font-weight: 600; color: var(--text-secondary);
  margin-bottom: 14px; letter-spacing: 1px; text-transform: uppercase;
}
.section-title .badge-count { font-weight: 400; }

.card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }

.card {
  display: block; padding: 24px 24px 20px; border-radius: 18px;
  border: 1px solid var(--border); text-decoration: none; color: var(--text);
  background: var(--bg);
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  transition: all 0.35s cubic-bezier(0.22,1,0.36,1);
  position: relative; text-align: center; overflow: hidden;
}
.card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0;
  height: 3px;
}
.card.math::before { background: var(--math); }
.card.physics::before { background: var(--physics); }
.card.chem::before { background: var(--chemistry); }

.card .icon-deco {
  position: absolute; top: -10px; right: -10px;
  width: 80px; height: 80px; opacity: 0.07;
  pointer-events: none;
}
.card .icon-deco svg { width: 100%; height: 100%; }
.card.math .icon-deco { color: var(--math); }
.card.physics .icon-deco { color: var(--physics); }
.card.chem .icon-deco { color: var(--chemistry); }
[data-theme="dark"] .card .icon-deco { opacity: 0.12; }

.card:hover {
  box-shadow: 0 12px 32px -10px rgba(0,0,0,0.1);
  transform: translateY(-3px);
  border-color: transparent;
}
[data-theme="dark"] .card:hover {
  box-shadow: 0 12px 32px -10px rgba(0,0,0,0.5);
  border-color: var(--border);
}

.card .subject { font-size: 22px; font-weight: 900; letter-spacing: -0.5px; display: block; }
.card .grade { font-size: 13px; color: var(--text-secondary); font-weight: 400; display: block; margin-top: 4px; }
.card .meta { margin-top: 8px; font-size: 12px; color: var(--text-secondary); }
.card .meta span + span { margin-left: 6px; padding-left: 6px; border-left: 1px solid var(--border); }

.card .badge {
  display: inline-block; font-size: 11px; font-weight: 700; letter-spacing: 0.3px;
  padding: 3px 14px; border-radius: 20px; margin-top: 14px;
}
.card .badge.sync { background: var(--accent-light); color: var(--accent); }
.card .badge.review { background: #fef3c7; color: #92400e; }
[data-theme="dark"] .card .badge.review { background: #451a03; color: #fbbf24; }

/* 复习入口特化样式 */
.card.review {
  background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%);
  border-color: #fcd34d;
}
[data-theme="dark"] .card.review {
  background: linear-gradient(135deg, #1c1917 0%, #451a03 100%);
  border-color: #92400e;
}
.card.review::before { background: var(--review); }
.card.review .icon-deco { color: var(--review); }
.card.review:hover {
  box-shadow: 0 12px 32px -10px rgba(217,119,6,0.2);
  border-color: var(--review);
}
[data-theme="dark"] .card.review:hover {
  box-shadow: 0 12px 32px -10px rgba(217,119,6,0.15);
}

.footer { text-align: center; margin-top: 40px; font-size: 12px; color: var(--text-secondary); }
.theme-btn {
  position: fixed; top: 16px; right: 16px;
  padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border);
  background: var(--bg); color: var(--text); cursor: pointer; font-size: 12px; z-index: 100;
}

@media (max-width: 600px) {
  body { padding: 24px 14px; }
  h1 { font-size: 22px; }
  .card-grid { grid-template-columns: 1fr; }
}
</style>
</head>

<script>
(function() {
  var btn = document.getElementById('theme-btn');
  var html = document.documentElement;
  var saved = localStorage.getItem('site-theme');
  if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
    html.setAttribute('data-theme', 'dark');
    btn.textContent = '☀️ 亮色';
  }
  btn.addEventListener('click', function() {
    if (html.getAttribute('data-theme') === 'dark') {
      html.setAttribute('data-theme', 'light');
      btn.textContent = '🌙 暗色';
      localStorage.setItem('site-theme', 'light');
    } else {
      html.setAttribute('data-theme', 'dark');
      btn.textContent = '☀️ 亮色';
      localStorage.setItem('site-theme', 'dark');
    }
  });
})();
</script>
